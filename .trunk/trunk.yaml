version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: configs
      ref: v1.1.2
      uri: https://github.com/trunk-io/configs
    - id: trunk
      ref: v1.7.4
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - node@22.16.0
    - python@3.10.8
lint:
  disabled:
    - mypy
    - pylint
  enabled:
    - gitleaks@8.30.0
    - yamllint@1.37.1
    - black@25.12.0
    - actionlint@1.7.9
    - bandit@1.9.2
    - checkov@3.2.495
    - git-diff-check
    - hadolint@2.14.0
    - isort@7.0.0
    - markdownlint@0.47.0
    - prettier@3.7.4
    - renovate@42.66.8
    - ruff@0.14.10
    - taplo@0.10.0
    - trufflehog@3.92.4
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
